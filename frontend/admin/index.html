<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - IELTS Admin Portal</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <!-- CSS -->
    <link rel="stylesheet" href="admin.css">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo" style="cursor: pointer;" onclick="window.location.href='index.html'">
                <img src="../logo (1).png" alt="BandPath Logo">
                <span>BandPath</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="./" class="nav-item active"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a></li>
                    <li><a href="users/" class="nav-item"><i data-lucide="users"></i><span>Users</span></a></li>
                    <li><a href="courses/" class="nav-item"><i data-lucide="book-open"></i><span>Courses</span></a></li>

                    <li><a href="settings/" class="nav-item"><i data-lucide="settings"></i><span>Settings</span></a></li>
                    <li><a href="#" id="logoutBtn" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="log-out" aria-hidden="true" class="lucide lucide-log-out"><path d="m16 17 5-5-5-5"></path><path d="M21 12H9"></path><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path></svg><span>Logout</span></a></li>
                    <div class="mode-toggle-wrapper">
                        <span class="toggle-label" id="custLabel">Customer</span>
                        <label class="switch">
                            <input type="checkbox" id="modeToggle" checked data-redirect="../">
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label active" id="adminLabel">Admin</span>
                    </div>
                </ul>
            </nav>
            <div style="margin-top: auto;">

            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div>
                    <h1 id="pageTitle">Admin Dashboard</h1>
                    <p style="color: var(--on-surface-variant); font-size: 0.875rem;">Welcome back, <span id="adminName">Admin</span></p>
                </div>
                <div class="header-actions">
                    <div class="card" style="padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.75rem; cursor: pointer;" onclick="window.location.href='../profile/'">
                        <div id="adminInitial" style="width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem;">A</div>
                        <span style="font-weight: 600; font-size: 0.875rem;">Administrator</span>
                    </div>
                </div>
            </header>

            <!-- Stats Overview -->
            <section class="stats-grid">
                <div class="stat-card card">
                    <span class="stat-label">Total Users</span>
                    <span class="stat-value" id="totalUsersCount">--</span>
                </div>
                <div class="stat-card card">
                    <span class="stat-label">Online Users</span>
                    <span class="stat-value" id="activeUsersCount">--</span>
                </div>
                <div class="stat-card card">
                    <span class="stat-label">Courses In Progress</span>
                    <span class="stat-value" id="coursesCount">12</span>
                </div>
                <div class="stat-card card">
                    <span class="stat-label">System Performance</span>
                    <span class="stat-value"><span id="systemPerformance">0</span>%</span>
                </div>
            </section>

            <!-- Recent Activity & Performance -->
            <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem;">
                <section class="card">
                    <h3 class="card-title">Enrollment Trends</h3>
                    <div id="enrollmentTrendsChart" style="height: 240px; background: var(--surface-container-low); border-radius: var(--radius-md); display: flex; align-items: flex-end; justify-content: space-around; padding: 1.5rem; gap: 0.5rem;">
                        <!-- Bars will be injected here -->
                    </div>
                </section>
                <section class="card">
                    <h3 class="card-title">Recent Activity</h3>
                    <ul id="recentActivityList" style="list-style: none; display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Activity items will be injected here -->
                    </ul>
                </section>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../auth.js"></script>
    <script src="common.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
