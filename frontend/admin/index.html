<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - BrightPath IELTS</title>
    <link rel="stylesheet" href="admin.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="../home/logo (1).png" alt="Logo">
            <span>BrightPath</span>
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </li>
            <li class="nav-item active">
                <i data-lucide="users"></i>
                <span>User Management</span>
            </li>
            <li class="nav-item">
                <i data-lucide="book-open"></i>
                <span>Courses</span>
            </li>
            <li class="nav-item">
                <i data-lucide="file-text"></i>
                <span>Content</span>
            </li>
            <li class="nav-item">
                <i data-lucide="settings"></i>
                <span>Settings</span>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="nav-item" id="logoutBtn">
                <i data-lucide="log-out"></i>
                <span>Logout</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <div class="header-left">
                <h1>User Management</h1>
            </div>
            <div class="header-right">
                <div class="search-bar">
                    <i data-lucide="search" style="width: 18px; color: #64748B;"></i>
                    <input type="text" id="userSearch" placeholder="Search users by name or email...">
                </div>
                <div class="admin-profile">
                    <div class="admin-avatar" id="adminInitial">A</div>
                    <span id="adminName">Admin Name</span>
                </div>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Total Users</span>
                <span class="stat-value" id="totalUsersCount">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Active Students</span>
                <span class="stat-value" id="activeStudentsCount">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Teachers</span>
                <span class="stat-value" id="teachersCount">0</span>
            </div>
        </div>

        <!-- User Table Card -->
        <div class="content-card">
            <div class="card-header">
                <h3>All Users</h3>
                <div class="header-actions">
                    <!-- Placeholder for filters/add button -->
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Joined Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Users will be injected here -->
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 40px;">
                                <div class="loading-spinner">Loading users...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../auth.js"></script>
    <script src="admin.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
